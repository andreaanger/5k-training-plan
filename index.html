<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="/5k_favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <script type="module" src="javascript/main.js"></script>
    <title>5K Training Plan</title>
  </head>
  <body>
    <main id="app-container" data-current-screen="home">
      <!-- HOME SCREEN -->
      <section id="home" class="screen">
        <button id="home-workout-settings-btn" class="nav-btn" data-target="settings" type="button" aria-label="Open settings">
          <img id="home-settings-icon" src="./images/settings-icon.svg" width="100%" height="100%" alt="" />
        </button>
        <h1 id="home-title">5k</h1>
        <button id="home-week-number" class="nav-btn" data-target="settings" type="button">WEEK 1</button>
        <div id="home-workout-number-div">
          <button class="workout-num-btn workout-num-selected" id="home-workout1-btn">1</button>
          <button class="workout-num-btn" id="home-workout2-btn">2</button>
          <button class="workout-num-btn" id="home-workout3-btn">3</button>
        </div>
        <button id="home-workout-view-workout-btn" class="nav-btn" data-target="workout-session" type="button" aria-label="View Workout Session">
          <img id="home-eye-icon" src="./images/eye_icon.png" width="10%" height="10%" alt="" />
          <p>view workout</p>
        </button>
        <button id="home-start-btn" class="nav-btn" data-target="workout">START</button>
      </section>
      <!-- SETTINGS SCREEN -->
      <section id="settings" class="screen">
        <button id="settings-exit-btn" class="nav-btn" data-target="home" aria-label="Close settings">X</button>
        <h1>WORKOUT SETTINGS</h1>
        <h3 class="settings-header">DURATIONS</h3>
        <table id="settings-duration-table">
          <tr>
            <td><label class="settings-duration-title" for="settings-warmup-slider">WARM UP</label></td>
            <td>
              <div class="slidecontainer">
                <input type="range" min="0" max="40" value="20" class="settings-duration-slider" id="settings-warmup-slider" />
              </div>
            </td>
          </tr>
          <tr>
            <td></td>
            <td>
              <p class="settings-duration-display" id="settings-warmup-duration-label">5:00</p>
            </td>
          </tr>
          <tr>
            <td><label class="settings-duration-title" for="settings-cooldown-slider">COOL DOWN</label></td>
            <td>
              <div class="slidecontainer">
                <input type="range" min="0" max="40" value="20" class="settings-duration-slider" id="settings-cooldown-slider" />
              </div>
            </td>
          </tr>
          <tr>
            <td></td>
            <td>
              <p class="settings-duration-display" id="settings-cooldown-duration-label">5:00</p>
            </td>
          </tr>
        </table>
        <h3 class="settings-header">WEEK NUMBER</h3>
        <div id="settings-week-number-div">
          <button class="settings-week-num-btn" id="settings-week1-btn">1</button>
          <button class="settings-week-num-btn" id="settings-week2-btn">2</button>
          <button class="settings-week-num-btn" id="settings-week3-btn">3</button>
          <button class="settings-week-num-btn" id="settings-week4-btn">4</button>
          <button class="settings-week-num-btn" id="settings-week5-btn">5</button>
          <button class="settings-week-num-btn" id="settings-week6-btn">6</button>
          <button class="settings-week-num-btn" id="settings-week7-btn">7</button>
          <button class="settings-week-num-btn" id="settings-week8-btn">8</button>
          <button class="settings-week-num-btn" id="settings-week9-btn">9</button>
        </div>
        <button id="settings-save-btn" class="nav-btn" data-target="home">SAVE</button>
      </section>
      <!-- WORKOUT SESSION SCREEN -->
      <section id="workout-session" class="screen">
        <button id="workout-session-exit-btn" class="nav-btn" data-target="home" aria-label="Close workout session">X</button>
        <h1>WORKOUT SESSION</h1>
        <div id="workout-session-details"></div>
      </section>
      <!-- WORKOUT SCREEN -->
      <section id="workout" class="screen">
        <h1 id="workout-action">READY!</h1>
        <h3 id="workout-timer">:00</h3>
      </section>
      <!-- ACTION SCREEN -->
      <section id="action" class="screen">
        <h1 id="action-title"></h1>
      </section>
    </main>
  </body>
</html>
